<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NHF Regelverkredigering</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Source+Sans+3:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f7f4ef;
    --surface: #ffffff;
    --surface2: #f0ece4;
    --accent: #2d5a27;
    --accent2: #4a8f41;
    --accent-light: #e8f2e6;
    --text: #1a1a18;
    --text2: #4a4a45;
    --text3: #7a7a72;
    --border: #d8d2c6;
    --border2: #e8e2d8;
    --gold: #8b6914;
    --gold-light: #f5edd8;
    --red: #8b2020;
    --red-light: #fdf0f0;
    --blue: #1a3a5c;
    --blue-light: #eaf2fb;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 4px 16px rgba(0,0,0,.04);
    --shadow-lg: 0 4px 24px rgba(0,0,0,.10);
    --radius: 10px;
    --sidebar: 280px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #16180f;
      --surface: #1e2217;
      --surface2: #262b1c;
      --accent: #7ecb73;
      --accent2: #5fa854;
      --accent-light: #1c2e1a;
      --text: #e8e4d8;
      --text2: #a8a89a;
      --text3: #686860;
      --border: #363824;
      --border2: #2e3020;
      --gold: #c8a84a;
      --gold-light: #2a2410;
      --red: #e06060;
      --red-light: #2a1010;
      --blue: #6ab0e8;
      --blue-light: #0e1e2e;
      --shadow: 0 1px 3px rgba(0,0,0,.3), 0 4px 16px rgba(0,0,0,.2);
    }
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Source Sans 3', system-ui, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; }

  /* === HEADER === */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 100;
    padding: 0 1.5rem;
  }
  .header-inner { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: .75rem; height: 58px; flex-wrap: nowrap; }
  .logo { font-family: 'Playfair Display', serif; font-weight: 700; font-size: 1.25rem; color: var(--accent); white-space: nowrap; flex-shrink: 0; }
  .logo span { color: var(--text2); font-weight: 400; font-size: .9rem; margin-left: .4rem; }
  .header-actions { display: flex; gap: .5rem; margin-left: auto; flex-shrink: 0; }
  .btn { padding: .4rem .85rem; border-radius: 7px; font-family: inherit; font-size: .84rem; font-weight: 600; cursor: pointer; border: 1px solid transparent; transition: background .12s, border-color .12s; white-space: nowrap; }
  .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent2); border-color: var(--accent2); }
  .btn-secondary { background: var(--surface2); color: var(--text2); border-color: var(--border); }
  .btn-secondary:hover { border-color: var(--accent2); color: var(--accent); }
  .btn-danger { background: var(--red-light); color: var(--red); border-color: var(--red-light); }
  .btn-danger:hover { border-color: var(--red); }
  .menu-btn { display: none; background: none; border: none; color: var(--text2); font-size: 1.4rem; cursor: pointer; padding: .3rem; }
  @media(max-width: 768px) { .menu-btn { display: block; } }
  @media(max-width: 540px) { .btn-label { display: none; } }

  /* === LAYOUT === */
  .layout { max-width: 1200px; margin: 0 auto; display: flex; }

  /* === SIDEBAR === */
  aside {
    width: var(--sidebar); flex-shrink: 0;
    background: var(--surface);
    border-right: 1px solid var(--border);
    height: calc(100vh - 58px);
    position: sticky; top: 58px;
    overflow-y: auto; overflow-x: hidden;
    padding: 1rem 0;
    scrollbar-width: thin; scrollbar-color: var(--border) transparent;
  }
  aside::-webkit-scrollbar { width: 4px; }
  aside::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
  .chapter-group { border-bottom: 1px solid var(--border2); }
  .chapter-btn {
    width: 100%; display: flex; align-items: center; gap: .6rem;
    padding: .65rem 1.1rem;
    background: none; border: none; cursor: pointer;
    font-family: 'Source Sans 3', sans-serif;
    font-size: .82rem; font-weight: 600; letter-spacing: .03em;
    color: var(--text2); text-align: left; text-transform: uppercase;
    transition: background .12s, color .12s;
  }
  .chapter-btn:hover { background: var(--accent-light); color: var(--accent); }
  .chapter-num { display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 50%; background: var(--border2);
    font-size: .72rem; font-weight: 600; color: var(--text3); flex-shrink: 0; }
  @media(max-width: 768px) {
    aside { display: none; width: 100%; height: auto; position: fixed; top: 58px; left: 0; right: 0; z-index: 90; border-right: none; border-bottom: 1px solid var(--border); max-height: 60vh; }
    aside.open { display: block; }
  }

  /* === MAIN === */
  main { flex: 1; min-width: 0; padding: 2rem 2.5rem; }
  @media(max-width: 1024px) { main { padding: 1.5rem; } }
  @media(max-width: 768px) { main { padding: 1rem; } }

  /* === CHAPTER CARD === */
  .ch-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 1.5rem;
    box-shadow: var(--shadow);
    overflow: hidden;
  }
  .ch-header {
    display: flex; align-items: center; gap: .6rem;
    padding: .75rem 1rem;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  .ch-label { font-size: .7rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em; color: var(--text3); white-space: nowrap; }
  .ch-num-input {
    width: 48px; padding: .3rem .45rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit; font-size: .84rem; font-weight: 600;
    background: var(--surface); color: var(--text); text-align: center;
  }
  .ch-title-input {
    flex: 1; padding: .3rem .55rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: 'Playfair Display', serif; font-size: 1rem;
    background: var(--surface); color: var(--text); min-width: 0;
  }
  .ch-num-input:focus, .ch-title-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(74,143,65,.15); }
  .ch-actions { display: flex; gap: .3rem; flex-shrink: 0; }
  .btn-icon {
    width: 30px; height: 30px; display: inline-flex; align-items: center; justify-content: center;
    border: 1px solid var(--border); border-radius: 6px; background: var(--surface);
    color: var(--text2); font-size: .85rem; cursor: pointer; transition: all .12s; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }
  .btn-icon.danger:hover { border-color: var(--red); color: var(--red); background: var(--red-light); }

  /* === RULES LIST === */
  .rules-list { padding: .5rem .75rem; }
  .ch-footer { padding: .6rem .75rem .75rem; }

  /* === RULE EDIT CARD === */
  .rule-edit-card {
    border: 1px solid var(--border2);
    border-radius: 8px;
    margin-bottom: .6rem;
    overflow: hidden;
    transition: box-shadow .12s;
  }
  .rule-edit-card:hover { box-shadow: var(--shadow); }
  .rule-edit-header {
    display: flex; align-items: center; gap: .5rem;
    padding: .55rem .75rem;
    background: var(--surface);
  }
  .rule-num-input {
    width: 52px; padding: .28rem .4rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: monospace; font-size: .82rem; font-weight: 700;
    background: var(--accent-light); color: var(--accent); text-align: center; flex-shrink: 0;
  }
  .rule-title-input {
    flex: 1; padding: .28rem .5rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit; font-size: .9rem; font-weight: 600;
    background: var(--surface); color: var(--text); min-width: 0;
  }
  .rule-num-input:focus, .rule-title-input:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(74,143,65,.15); }
  .bor-toggle { display: flex; align-items: center; gap: .3rem; font-size: .78rem; font-weight: 600; color: var(--gold); cursor: pointer; white-space: nowrap; flex-shrink: 0; }
  .bor-toggle input { accent-color: var(--gold); cursor: pointer; }
  .rule-actions { display: flex; gap: .3rem; flex-shrink: 0; }
  .rule-move-select {
    height: 30px; padding: 0 .4rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit; font-size: .78rem;
    background: var(--surface); color: var(--text2); cursor: pointer;
    max-width: 130px;
  }
  .rule-move-select:focus { outline: none; border-color: var(--accent2); }

  /* Rule body editor */
  .rule-edit-body { background: var(--surface2); border-top: 1px solid var(--border2); padding: .75rem; }
  .body-tabs { display: flex; gap: .4rem; margin-bottom: .6rem; }
  .tab-btn {
    padding: .28rem .7rem; border: 1px solid var(--border);
    border-radius: 6px; font-family: inherit; font-size: .8rem; font-weight: 600;
    background: var(--surface); color: var(--text2); cursor: pointer; transition: all .12s;
  }
  .tab-btn.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .body-textarea {
    width: 100%; min-height: 160px; padding: .6rem .8rem;
    border: 1px solid var(--border); border-radius: 7px;
    font-family: 'Courier New', monospace; font-size: .82rem; line-height: 1.55;
    background: var(--surface); color: var(--text);
    resize: vertical;
  }
  .body-textarea:focus { outline: none; border-color: var(--accent2); box-shadow: 0 0 0 2px rgba(74,143,65,.15); }
  .body-preview {
    background: var(--surface); border: 1px solid var(--border); border-radius: 7px;
    padding: .8rem 1rem; font-size: .9rem; color: var(--text2); line-height: 1.65;
    min-height: 80px;
  }
  .body-preview p, .body-preview li { margin-bottom: .4rem; }
  .body-preview ol, .body-preview ul { padding-left: 1.3rem; }
  .body-preview strong { color: var(--text); }
  .body-preview .bor-note {
    background: var(--gold-light); border: 1px solid #dab96a; border-radius: 8px;
    padding: .5rem .8rem; font-size: .82rem; color: var(--gold); margin-top: .7rem; display: flex; gap: .5rem;
  }

  /* Add buttons */
  .btn-add-rule { width: 100%; padding: .45rem; border: 1px dashed var(--border); border-radius: 7px; background: none; color: var(--text3); font-family: inherit; font-size: .84rem; cursor: pointer; transition: all .12s; }
  .btn-add-rule:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }
  .btn-add-chapter { display: block; width: 100%; padding: .65rem; border: 2px dashed var(--border); border-radius: var(--radius); background: none; color: var(--text3); font-family: inherit; font-size: .9rem; font-weight: 600; cursor: pointer; transition: all .12s; margin-top: .5rem; }
  .btn-add-chapter:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }

  /* Toast */
  .toast {
    position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 200;
    background: var(--accent); color: #fff; padding: .6rem 1.1rem;
    border-radius: 8px; font-size: .88rem; font-weight: 600;
    box-shadow: var(--shadow-lg); opacity: 0; transform: translateY(8px);
    transition: opacity .2s, transform .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* Unsaved indicator */
  .unsaved-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--gold); display: inline-block; margin-left: .4rem; }

  @media(max-width: 600px) {
    .rule-move-select { display: none; }
    .bor-toggle span { display: none; }
    .ch-label { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="logo">NHF<span>Rediger</span></div>
    <div class="header-actions">
      <button class="btn btn-secondary" id="btn-open" title="Opne JSON-fil">
        📂 <span class="btn-label">Opne fil</span>
      </button>
      <button class="btn btn-primary" id="btn-save" title="Lagre til JSON-fil">
        💾 <span class="btn-label">Lagre fil</span>
      </button>
    </div>
    <button class="menu-btn" id="menu-btn" aria-label="Vis meny">☰</button>
  </div>
</header>

<div class="layout">
<aside id="sidebar"></aside>

<main id="main-content">
  <div id="chapters-container"></div>
  <button class="btn-add-chapter" id="btn-add-chapter">+ Legg til nytt kapittel</button>
</main>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Storage helpers ─────────────────────────────────────────────────────────
const STORAGE_KEY = 'nhf-reglar';

function loadData() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) { try { return JSON.parse(stored); } catch(e) {} }
  return null;
}

function saveData(data) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
}

// ── State ───────────────────────────────────────────────────────────────────
let rules = loadData() || [];
let unsaved = false;

function markUnsaved() {
  unsaved = true;
  document.title = '● NHF Regelverkredigering';
}

function markSaved() {
  unsaved = false;
  document.title = 'NHF Regelverkredigering';
}

// ── Toast ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

// ── ID generator ────────────────────────────────────────────────────────────
function genId() {
  return 'id' + Math.random().toString(36).slice(2, 9);
}

// ── Render sidebar ──────────────────────────────────────────────────────────
function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  sidebar.innerHTML = '';
  rules.forEach(ch => {
    const group = document.createElement('div');
    group.className = 'chapter-group';
    const numStr = ch.chapter.replace(/[^0-9]/g, '') || '?';
    const btn = document.createElement('button');
    btn.className = 'chapter-btn';
    btn.innerHTML = `<span class="chapter-num">${numStr}</span><span>${ch.title}</span>`;
    btn.addEventListener('click', () => {
      document.getElementById('ch-' + ch.id)?.scrollIntoView({ behavior: 'smooth', block: 'start' });
      closeSidebarIfMobile();
    });
    group.appendChild(btn);
    sidebar.appendChild(group);
  });
}

// ── Render all chapters ──────────────────────────────────────────────────────
function renderAll() {
  renderSidebar();
  renderChapters();
}

function renderChapters() {
  const container = document.getElementById('chapters-container');
  container.innerHTML = '';
  rules.forEach((ch, ci) => {
    container.appendChild(buildChapterCard(ch, ci));
  });
}

// ── Build chapter card ───────────────────────────────────────────────────────
function buildChapterCard(ch, ci) {
  const card = document.createElement('div');
  card.className = 'ch-card';
  card.id = 'ch-' + ch.id;

  // Chapter header
  const hdr = document.createElement('div');
  hdr.className = 'ch-header';

  const label = document.createElement('span');
  label.className = 'ch-label';
  label.textContent = 'Kapittel';

  const numInput = document.createElement('input');
  numInput.className = 'ch-num-input';
  numInput.value = ch.chapter.replace(/[^0-9]/g, '');
  numInput.title = 'Kapittelnummer';
  numInput.addEventListener('input', () => {
    ch.chapter = 'Kapittel ' + numInput.value;
    autoSave();
    renderSidebar();
  });

  const titleInput = document.createElement('input');
  titleInput.className = 'ch-title-input';
  titleInput.value = ch.title;
  titleInput.title = 'Kapitteltittel';
  titleInput.addEventListener('input', () => {
    ch.title = titleInput.value;
    autoSave();
    renderSidebar();
  });

  const actions = document.createElement('div');
  actions.className = 'ch-actions';

  const upBtn = iconBtn('↑', 'Flytt kapittel opp', false);
  upBtn.addEventListener('click', () => {
    if (ci === 0) return;
    [rules[ci - 1], rules[ci]] = [rules[ci], rules[ci - 1]];
    autoSave();
    renderAll();
  });

  const downBtn = iconBtn('↓', 'Flytt kapittel ned', false);
  downBtn.addEventListener('click', () => {
    if (ci === rules.length - 1) return;
    [rules[ci], rules[ci + 1]] = [rules[ci + 1], rules[ci]];
    autoSave();
    renderAll();
  });

  const delBtn = iconBtn('✕', 'Slett kapittel', true);
  delBtn.addEventListener('click', () => {
    if (ch.rules.length > 0 && !confirm(`Slett «${ch.title}» og alle ${ch.rules.length} reglane i det?`)) return;
    rules.splice(ci, 1);
    autoSave();
    renderAll();
  });

  actions.append(upBtn, downBtn, delBtn);
  hdr.append(label, numInput, titleInput, actions);
  card.appendChild(hdr);

  // Rules list
  const rulesList = document.createElement('div');
  rulesList.className = 'rules-list';
  ch.rules.forEach((r, ri) => {
    rulesList.appendChild(buildRuleCard(r, ri, ch, ci));
  });
  card.appendChild(rulesList);

  // Footer with add rule button
  const footer = document.createElement('div');
  footer.className = 'ch-footer';
  const addBtn = document.createElement('button');
  addBtn.className = 'btn-add-rule';
  addBtn.textContent = '+ Legg til regel';
  addBtn.addEventListener('click', () => {
    const newRule = { id: genId(), num: '', title: 'Ny regel', bor: false, body: '<p></p>' };
    ch.rules.push(newRule);
    autoSave();
    // Re-render just the rules list
    rulesList.appendChild(buildRuleCard(newRule, ch.rules.length - 1, ch, ci));
    // Scroll and open body editor
    const newCard = rulesList.lastElementChild;
    newCard.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
    newCard.querySelector('.btn-edit-toggle')?.click();
  });
  footer.appendChild(addBtn);
  card.appendChild(footer);

  return card;
}

// ── Build rule card ──────────────────────────────────────────────────────────
function buildRuleCard(r, ri, ch, ci) {
  const card = document.createElement('div');
  card.className = 'rule-edit-card';
  card.id = 'rule-' + r.id;

  // Header row
  const hdr = document.createElement('div');
  hdr.className = 'rule-edit-header';

  const numInput = document.createElement('input');
  numInput.className = 'rule-num-input';
  numInput.value = r.num;
  numInput.title = 'Regelnummer';
  numInput.addEventListener('input', () => { r.num = numInput.value; autoSave(); });

  const titleInput = document.createElement('input');
  titleInput.className = 'rule-title-input';
  titleInput.value = r.title;
  titleInput.title = 'Regeltittel';
  titleInput.addEventListener('input', () => { r.title = titleInput.value; autoSave(); });

  const borLabel = document.createElement('label');
  borLabel.className = 'bor-toggle';
  const borCheck = document.createElement('input');
  borCheck.type = 'checkbox';
  borCheck.checked = r.bor;
  borCheck.addEventListener('change', () => { r.bor = borCheck.checked; autoSave(); });
  borLabel.append(borCheck, document.createTextNode(' ⚠ Bør'));
  borLabel.title = 'Merk som «bør»-regel';

  const actions = document.createElement('div');
  actions.className = 'rule-actions';

  // Up/down within chapter
  const upBtn = iconBtn('↑', 'Flytt opp', false);
  upBtn.addEventListener('click', () => {
    if (ri === 0) return;
    [ch.rules[ri - 1], ch.rules[ri]] = [ch.rules[ri], ch.rules[ri - 1]];
    autoSave();
    renderChapters();
  });
  const downBtn = iconBtn('↓', 'Flytt ned', false);
  downBtn.addEventListener('click', () => {
    if (ri === ch.rules.length - 1) return;
    [ch.rules[ri], ch.rules[ri + 1]] = [ch.rules[ri + 1], ch.rules[ri]];
    autoSave();
    renderChapters();
  });

  // Move to chapter dropdown
  const moveSelect = document.createElement('select');
  moveSelect.className = 'rule-move-select';
  moveSelect.title = 'Flytt til anna kapittel';
  const defaultOpt = document.createElement('option');
  defaultOpt.value = '';
  defaultOpt.textContent = 'Flytt til…';
  moveSelect.appendChild(defaultOpt);
  rules.forEach((c, idx) => {
    if (c.id === ch.id) return;
    const opt = document.createElement('option');
    opt.value = c.id;
    opt.textContent = c.chapter + ': ' + c.title.substring(0, 25) + (c.title.length > 25 ? '…' : '');
    moveSelect.appendChild(opt);
  });
  moveSelect.addEventListener('change', () => {
    const targetId = moveSelect.value;
    if (!targetId) return;
    const targetCh = rules.find(c => c.id === targetId);
    if (!targetCh) return;
    ch.rules.splice(ri, 1);
    targetCh.rules.push(r);
    autoSave();
    renderAll();
    showToast('Regel flytta til ' + targetCh.chapter);
  });

  // Toggle body editor
  const editBtn = iconBtn('✏', 'Rediger innhald', false);
  editBtn.classList.add('btn-edit-toggle');

  const delBtn = iconBtn('✕', 'Slett regel', true);
  delBtn.addEventListener('click', () => {
    if (!confirm(`Slett regel ${r.num}: «${r.title}»?`)) return;
    ch.rules.splice(ri, 1);
    autoSave();
    card.remove();
  });

  actions.append(upBtn, downBtn, moveSelect, editBtn, delBtn);
  hdr.append(numInput, titleInput, borLabel, actions);
  card.appendChild(hdr);

  // Body editor (hidden by default)
  const bodySection = document.createElement('div');
  bodySection.className = 'rule-edit-body';
  bodySection.style.display = 'none';

  const tabs = document.createElement('div');
  tabs.className = 'body-tabs';
  const tabEdit = document.createElement('button');
  tabEdit.className = 'tab-btn active';
  tabEdit.textContent = 'Rediger HTML';
  const tabPreview = document.createElement('button');
  tabPreview.className = 'tab-btn';
  tabPreview.textContent = 'Førehandsvisning';
  tabs.append(tabEdit, tabPreview);

  const textarea = document.createElement('textarea');
  textarea.className = 'body-textarea';
  textarea.value = r.body;
  textarea.spellcheck = false;
  textarea.addEventListener('input', () => { r.body = textarea.value; autoSave(); });

  const preview = document.createElement('div');
  preview.className = 'body-preview';
  preview.style.display = 'none';

  tabEdit.addEventListener('click', () => {
    tabEdit.classList.add('active');
    tabPreview.classList.remove('active');
    textarea.style.display = '';
    preview.style.display = 'none';
  });
  tabPreview.addEventListener('click', () => {
    tabPreview.classList.add('active');
    tabEdit.classList.remove('active');
    textarea.style.display = 'none';
    preview.innerHTML = r.body;
    preview.style.display = '';
  });

  bodySection.append(tabs, textarea, preview);
  card.appendChild(bodySection);

  // Toggle body section
  editBtn.addEventListener('click', () => {
    const isOpen = bodySection.style.display !== 'none';
    bodySection.style.display = isOpen ? 'none' : '';
    editBtn.style.background = isOpen ? '' : 'var(--accent-light)';
    editBtn.style.borderColor = isOpen ? '' : 'var(--accent2)';
    editBtn.style.color = isOpen ? '' : 'var(--accent)';
    if (!isOpen) textarea.focus();
  });

  return card;
}

// ── Icon button helper ───────────────────────────────────────────────────────
function iconBtn(text, title, danger) {
  const btn = document.createElement('button');
  btn.className = 'btn-icon' + (danger ? ' danger' : '');
  btn.textContent = text;
  btn.title = title;
  return btn;
}

// ── Auto-save ────────────────────────────────────────────────────────────────
let autoSaveTimer;
function autoSave() {
  markUnsaved();
  clearTimeout(autoSaveTimer);
  autoSaveTimer = setTimeout(() => {
    saveData(rules);
    markSaved();
  }, 600);
}

// ── File open ────────────────────────────────────────────────────────────────
document.getElementById('btn-open').addEventListener('click', async () => {
  if (unsaved && !confirm('Du har ulagra endringar. Vil du opne ein ny fil og miste dei?')) return;

  if (window.showOpenFilePicker) {
    try {
      const [fh] = await window.showOpenFilePicker({ types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
      const file = await fh.getFile();
      const text = await file.text();
      const parsed = JSON.parse(text);
      rules = parsed;
      saveData(rules);
      markSaved();
      renderAll();
      showToast('Fil opna: ' + file.name);
    } catch (e) { if (e.name !== 'AbortError') alert('Kunne ikkje opne fil: ' + e.message); }
  } else {
    // Fallback: file input
    const input = document.createElement('input');
    input.type = 'file'; input.accept = '.json';
    input.addEventListener('change', async () => {
      const file = input.files[0];
      if (!file) return;
      const text = await file.text();
      try {
        rules = JSON.parse(text);
        saveData(rules);
        markSaved();
        renderAll();
        showToast('Fil opna: ' + file.name);
      } catch (e) { alert('Ugyldig JSON-fil.'); }
    });
    input.click();
  }
});

// ── File save ────────────────────────────────────────────────────────────────
document.getElementById('btn-save').addEventListener('click', async () => {
  const json = JSON.stringify(rules, null, 2);
  const blob = new Blob([json], { type: 'application/json' });

  if (window.showSaveFilePicker) {
    try {
      const fh = await window.showSaveFilePicker({ suggestedName: 'reglar.json', types: [{ description: 'JSON', accept: { 'application/json': ['.json'] } }] });
      const writable = await fh.createWritable();
      await writable.write(blob);
      await writable.close();
      saveData(rules);
      markSaved();
      showToast('Lagra!');
    } catch (e) { if (e.name !== 'AbortError') alert('Kunne ikkje lagre: ' + e.message); }
  } else {
    // Fallback: download
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'reglar.json';
    a.click();
    URL.revokeObjectURL(url);
    saveData(rules);
    markSaved();
    showToast('Fil lasta ned');
  }
});

// ── Add chapter ──────────────────────────────────────────────────────────────
document.getElementById('btn-add-chapter').addEventListener('click', () => {
  const newCh = { id: genId(), chapter: 'Kapittel ?', title: 'Nytt kapittel', rules: [] };
  rules.push(newCh);
  autoSave();
  renderAll();
  const newCard = document.getElementById('ch-' + newCh.id);
  newCard?.scrollIntoView({ behavior: 'smooth', block: 'start' });
  newCard?.querySelector('.ch-num-input')?.focus();
});

// ── Hamburger / mobile sidebar ───────────────────────────────────────────────
document.getElementById('menu-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.toggle('open');
});
function closeSidebarIfMobile() {
  if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
}

// ── Load from JSON file if no localStorage data ──────────────────────────────
async function initData() {
  if (rules.length > 0) {
    renderAll();
    return;
  }
  // Try to load reglar.json from same folder
  try {
    const resp = await fetch('./reglar.json');
    if (resp.ok) {
      rules = await resp.json();
      saveData(rules);
      renderAll();
      showToast('Lasta reglar frå reglar.json');
      return;
    }
  } catch (e) {}
  // No data at all
  renderAll();
  showToast('Ingen data – opne ein JSON-fil for å starte');
}

initData();
</script>
